version: "2"
linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - copyloopvar
    - depguard
    - dogsled
    - errcheck
    - durationcheck
    - gochecknoinits
    - gocritic
    - goprintffuncname

    - govet
    - ineffassign
    - makezero
    - misspell
    - musttag
    - nonamedreturns
    - nolintlint
    - prealloc
    - revive
    - sloglint
    - staticcheck
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - wsl_v5
    - whitespace
  settings:
    depguard:
      rules:
        Main:
          files:
            - $all
          deny:
            - pkg: github.com/evanphx/json-patch
              desc: The 'github.com/evanphx/json-patch' package is superseded. Use pkg/utils/jsonpatch.go instead.
            - pkg: github.com/golang/mock
              desc: "In public archive. Use 'github.com/gojuno/minimock' instead."
            - pkg: "github.com/samber/lo"
              desc: "This package must not be used, because of increasing cognitive complexity."
    errcheck:
      exclude-functions:
        - fmt:.*[rR]ead|[wW]rite|[cC]lose
        - io:Copy
        - (io.Writer).Write
    sloglint:
      no-mixed-args: true
      # Enforce using key-value pairs only (overrides no-mixed-args, incompatible with attr-only).
      kv-only: false
      # Enforce using attributes only (overrides no-mixed-args, incompatible with kv-only).
      attr-only: false
      # Enforce not using global loggers.
      no-global: ""
      # Enforce using methods that accept a context.
      context: ""
      # Enforce using static values for log messages.
      static-msg: false
      # Enforce using constants instead of raw keys.
      no-raw-keys: false
      # Enforce a single key naming convention.
      key-naming-case: "snake"
      # Enforce not using specific keys.
      forbidden-keys:
        - level
        - msg
        - logger
        - source
        - stacktrace
        - time
      # Enforce putting arguments on separate lines.
      args-on-sep-lines: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: (.+)\.go$
        text: 'var-naming: don''t use an underscore in package name'
      - path: (.+)\.go$
        text: 'ST1003: should not use underscores in package names'
      - path: (.+)\.go$
        text: 'ST1005: error strings should not be capitalized'
      - path: (.+)\.go$
        text: 'error-strings: error strings should not be capitalized or end with punctuation or a newline'
      - path: (.+)\.go$
        text: 'ST1005: error strings should not end with punctuation or newlines'
      - path: (.+)\.go$
        text: 'dot-imports: should not use dot imports'
      - path: (.+)\.go$
        text: 'ST1001: should not use dot imports'
      - path: (.+)\.go$
        text: don't use `init` function
      - path: (.+)\.go$
        text: 'var-naming:'
      - path: (.+)\.go$
        text: 'ST1003: '
      - path: (.+)\.go$
        text: 'exported: type name will be used as .*'
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/flant/)
        - localmodule
    goimports:
      local-prefixes:
        - github.com/flant/
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - ^tools$
